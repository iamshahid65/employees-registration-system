# azure-pipelines.yml
trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/**

variables:
  # ─── Azure Settings ───────────────────────────────────────────
  azureSubscription: 'YOUR_SERVICE_CONNECTION_NAME'
  resourceGroupName: 'rg-myapp-prod'
  location: 'eastus'

  # ─── ACR Settings ─────────────────────────────────────────────
  acrName: 'myappacr'
  acrLoginServer: 'myappacr.azurecr.io'

  # ─── App Service Settings ──────────────────────────────────────
  frontendAppService: 'app-frontend-prod'
  backendAppService: 'app-backend-prod'

  # ─── Image Settings ────────────────────────────────────────────
  frontendImageName: 'frontend'
  backendImageName: 'backend'
  imageTag: '$(Build.BuildId)'

  # ─── Terraform Settings ────────────────────────────────────────
  terraformWorkingDir: '$(System.DefaultWorkingDirectory)/terraform'
  terraformStateRG: 'rg-terraform-state'
  terraformStorageAccount: 'tfstatemyapp'
  terraformStorageContainer: 'tfstate'
  terraformStateFile: 'myapp.terraform.tfstate'

  # ─── Control Flags ─────────────────────────────────────────────
  # This variable will be managed via Variable Group in Azure DevOps
  # Set INFRA_DEPLOYED = false on first run, pipeline sets it to true after
  INFRA_DEPLOYED: $[variables.INFRA_DEPLOYED]

pool:
  vmImage: 'ubuntu-latest'

stages:

# ══════════════════════════════════════════════════════════════════
# STAGE 1: VALIDATE & CHECK
# ══════════════════════════════════════════════════════════════════
  - stage: Validate
    displayName: '🔍 Validate & Pre-checks'
    jobs:
      - job: PreCheck
        displayName: 'Pre-flight Checks'
        steps:

          - checkout: self
            fetchDepth: 0

          - task: Bash@3
            displayName: 'Check Infrastructure Deploy Flag'
            name: checkFlag
            inputs:
              targetType: 'inline'
              script: |
                echo "============================================="
                echo " Pipeline Run Info"
                echo "============================================="
                echo "Build ID      : $(Build.BuildId)"
                echo "Branch        : $(Build.SourceBranchName)"
                echo "Triggered by  : $(Build.Reason)"
                echo "INFRA_DEPLOYED: $(INFRA_DEPLOYED)"
                echo "============================================="

                # Determine if terraform should run
                if [ "$(INFRA_DEPLOYED)" = "true" ]; then
                  echo "##vso[task.setvariable variable=runTerraform;isOutput=true]false"
                  echo "✅ Infrastructure already deployed - Skipping Terraform"
                else
                  echo "##vso[task.setvariable variable=runTerraform;isOutput=true]true"
                  echo "🚀 First run detected - Terraform will be executed"
                fi

          - task: Bash@3
            displayName: 'Validate Dockerfiles Exist'
            inputs:
              targetType: 'inline'
              script: |
                echo "Checking Dockerfiles..."

                if [ ! -f "$(System.DefaultWorkingDirectory)/frontend/Dockerfile" ]; then
                  echo "##vso[task.logissue type=error]Frontend Dockerfile not found!"
                  exit 1
                fi
                echo "✅ Frontend Dockerfile found"

                if [ ! -f "$(System.DefaultWorkingDirectory)/backend/Dockerfile" ]; then
                  echo "##vso[task.logissue type=error]Backend Dockerfile not found!"
                  exit 1
                fi
                echo "✅ Backend Dockerfile found"

                if [ ! -d "$(System.DefaultWorkingDirectory)/terraform" ]; then
                  echo "##vso[task.logissue type=error]Terraform directory not found!"
                  exit 1
                fi
                echo "✅ Terraform directory found"


# ══════════════════════════════════════════════════════════════════
# STAGE 2: TERRAFORM - ONLY ON FIRST RUN
# ══════════════════════════════════════════════════════════════════
  - stage: Terraform
    displayName: '🏗️ Infrastructure Provisioning'
    dependsOn: Validate
    # Only run when INFRA_DEPLOYED is NOT true
    condition: |
      and(
        succeeded(),
        ne(variables['INFRA_DEPLOYED'], 'true')
      )
    variables:
      runTerraform: $[stageDependencies.Validate.PreCheck.outputs['checkFlag.runTerraform']]

    jobs:
      - job: TerraformProvision
        displayName: 'Terraform Init → Plan → Apply'
        timeoutInMinutes: 60

        steps:
          - checkout: self

          # ── Ensure Terraform Backend Storage Exists ──────────────
          - task: AzureCLI@2
            displayName: '📦 Create Terraform Backend Storage'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Creating Terraform state storage if not exists..."

                # Create Resource Group for state
                az group create \
                  --name $(terraformStateRG) \
                  --location $(location) \
                  --output none 2>/dev/null || true

                # Create Storage Account
                az storage account create \
                  --name $(terraformStorageAccount) \
                  --resource-group $(terraformStateRG) \
                  --location $(location) \
                  --sku Standard_LRS \
                  --output none 2>/dev/null || true

                # Create Container
                az storage container create \
                  --name $(terraformStorageContainer) \
                  --account-name $(terraformStorageAccount) \
                  --output none 2>/dev/null || true

                echo "✅ Terraform backend storage ready"

                # Fetch storage key and set as pipeline variable
                STORAGE_KEY=$(az storage account keys list \
                  --account-name $(terraformStorageAccount) \
                  --resource-group $(terraformStateRG) \
                  --query '[0].value' -o tsv)

                echo "##vso[task.setvariable variable=ARM_ACCESS_KEY;issecret=true]$STORAGE_KEY"

          # ── Terraform Init ───────────────────────────────────────
          - task: TerraformTaskV4@4
            displayName: '⚙️ Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(terraformWorkingDir)'
              backendServiceArm: '$(azureSubscription)'
              backendAzureRmResourceGroupName: '$(terraformStateRG)'
              backendAzureRmStorageAccountName: '$(terraformStorageAccount)'
              backendAzureRmContainerName: '$(terraformStorageContainer)'
              backendAzureRmKey: '$(terraformStateFile)'

          # ── Terraform Validate ───────────────────────────────────
          - task: TerraformTaskV4@4
            displayName: '✔️ Terraform Validate'
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: '$(terraformWorkingDir)'

          # ── Terraform Plan ───────────────────────────────────────
          - task: TerraformTaskV4@4
            displayName: '📋 Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(terraformWorkingDir)'
              commandOptions: |
                -out=$(terraformWorkingDir)/tfplan
                -var="resource_group_name=$(resourceGroupName)"
                -var="location=$(location)"
                -var="acr_name=$(acrName)"
                -var="frontend_app_name=$(frontendAppService)"
                -var="backend_app_name=$(backendAppService)"
              environmentServiceNameAzureRM: '$(azureSubscription)'

          # ── Publish Plan as Artifact ─────────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: '📤 Publish Terraform Plan'
            inputs:
              targetPath: '$(terraformWorkingDir)/tfplan'
              artifact: 'terraform-plan'
              publishLocation: 'pipeline'

          # ── Terraform Apply ──────────────────────────────────────
          - task: TerraformTaskV4@4
            displayName: '🚀 Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(terraformWorkingDir)'
              commandOptions: '-auto-approve $(terraformWorkingDir)/tfplan'
              environmentServiceNameAzureRM: '$(azureSubscription)'

          # ── Capture Terraform Outputs ────────────────────────────
          - task: AzureCLI@2
            displayName: '📊 Capture Terraform Outputs'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(terraformWorkingDir)'
              inlineScript: |
                echo "Fetching Terraform outputs..."

                ACR_LOGIN=$(terraform output -raw acr_login_server 2>/dev/null || echo "$(acrLoginServer)")
                echo "ACR Login Server: $ACR_LOGIN"
                echo "##vso[task.setvariable variable=acrLoginServer;isOutput=true]$ACR_LOGIN"

                echo "✅ Terraform outputs captured"

          # ── Mark Infra as Deployed ───────────────────────────────
          - task: AzureCLI@2
            displayName: '🏁 Mark Infrastructure as Deployed'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Updating pipeline variable INFRA_DEPLOYED to true..."

                # Get organization and project from predefined variables
                ORG_URL="$(System.TeamFoundationCollectionUri)"
                PROJECT="$(System.TeamProject)"
                PIPELINE_ID="$(System.DefinitionId)"

                # Update Variable Group via Azure DevOps REST API
                # NOTE: Requires a PAT token stored as secret variable PAT_TOKEN
                # Variable Group ID must be set - replace YOUR_VARIABLE_GROUP_ID

                VARIABLE_GROUP_ID="YOUR_VARIABLE_GROUP_ID"

                curl -s -X PUT \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Basic $(echo -n :$(PAT_TOKEN) | base64)" \
                  "${ORG_URL}$(PROJECT)/_apis/distributedtask/variablegroups/${VARIABLE_GROUP_ID}?api-version=7.0" \
                  -d '{
                    "id": '"$VARIABLE_GROUP_ID"',
                    "name": "pipeline-control-variables",
                    "variables": {
                      "INFRA_DEPLOYED": {
                        "value": "true",
                        "isSecret": false
                      }
                    }
                  }' || echo "⚠️ Could not update variable group automatically"

                echo "✅ Infrastructure deployment flag updated"


# ══════════════════════════════════════════════════════════════════
# STAGE 3: BUILD DOCKER IMAGES
# ══════════════════════════════════════════════════════════════════
  - stage: Build
    displayName: '🐳 Build Docker Images'
    dependsOn:
      - Validate
      - Terraform
    # Run if Terraform succeeded OR was skipped (infra already deployed)
    condition: |
      and(
        not(failed()),
        not(canceled()),
        in(dependencies.Terraform.result, 'Succeeded', 'Skipped')
      )

    jobs:
      # ── Build Backend Image ──────────────────────────────────────
      - job: BuildBackend
        displayName: 'Build Backend Image'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: '🔐 Login to ACR'
            inputs:
              command: 'login'
              containerRegistry: '$(acrName)'

          - task: Docker@2
            displayName: '🔨 Build Backend Docker Image'
            inputs:
              command: 'build'
              repository: '$(acrLoginServer)/$(backendImageName)'
              dockerfile: '$(System.DefaultWorkingDirectory)/backend/Dockerfile'
              buildContext: '$(System.DefaultWorkingDirectory)/backend'
              tags: |
                $(imageTag)
                latest
              arguments: '--no-cache --build-arg BUILD_ENV=production'

          - task: Docker@2
            displayName: '📤 Push Backend Image to ACR'
            inputs:
              command: 'push'
              repository: '$(acrLoginServer)/$(backendImageName)'
              tags: |
                $(imageTag)
                latest

          - task: Bash@3
            displayName: '🔍 Verify Backend Image in ACR'
            inputs:
              targetType: 'inline'
              script: |
                echo "Verifying backend image was pushed successfully..."
                az acr repository show-tags \
                  --name $(acrName) \
                  --repository $(backendImageName) \
                  --output table
            env:
              AZURE_CLI_VERSION: '2.50.0'

      # ── Build Frontend Image ─────────────────────────────────────
      - job: BuildFrontend
        displayName: 'Build Frontend Image'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: '🔐 Login to ACR'
            inputs:
              command: 'login'
              containerRegistry: '$(acrName)'

          - task: Docker@2
            displayName: '🔨 Build Frontend Docker Image'
            inputs:
              command: 'build'
              repository: '$(acrLoginServer)/$(frontendImageName)'
              dockerfile: '$(System.DefaultWorkingDirectory)/frontend/Dockerfile'
              buildContext: '$(System.DefaultWorkingDirectory)/frontend'
              tags: |
                $(imageTag)
                latest
              arguments: '--no-cache --build-arg BUILD_ENV=production'

          - task: Docker@2
            displayName: '📤 Push Frontend Image to ACR'
            inputs:
              command: 'push'
              repository: '$(acrLoginServer)/$(frontendImageName)'
              tags: |
                $(imageTag)
                latest

          - task: Bash@3
            displayName: '🔍 Verify Frontend Image in ACR'
            inputs:
              targetType: 'inline'
              script: |
                echo "Verifying frontend image was pushed successfully..."
                az acr repository show-tags \
                  --name $(acrName) \
                  --repository $(frontendImageName) \
                  --output table


# ══════════════════════════════════════════════════════════════════
# STAGE 4: DEPLOY TO APP SERVICES
# ══════════════════════════════════════════════════════════════════
  - stage: Deploy
    displayName: '🚀 Deploy to App Services'
    dependsOn: Build
    condition: |
      and(
        succeeded(),
        in(dependencies.Build.result, 'Succeeded')
      )

    jobs:
      # ── Deploy Backend ───────────────────────────────────────────
      - deployment: DeployBackend
        displayName: 'Deploy Backend App Service'
        environment: 'production-backend'
        strategy:
          runOnce:
            deploy:
              steps:

                - task: AzureCLI@2
                  displayName: '⚙️ Configure Backend App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Configuring Backend App Service settings..."

                      # Fetch secrets from Key Vault
                      KV_NAME=$(az keyvault list \
                        --resource-group $(resourceGroupName) \
                        --query '[0].name' -o tsv)

                      echo "Key Vault: $KV_NAME"

                      DB_CONNECTION=$(az keyvault secret show \
                        --name "db-connection-string" \
                        --vault-name $KV_NAME \
                        --query value -o tsv 2>/dev/null || echo "")

                      # Update App Service container settings
                      az webapp config container set \
                        --name $(backendAppService) \
                        --resource-group $(resourceGroupName) \
                        --docker-custom-image-name $(acrLoginServer)/$(backendImageName):$(imageTag) \
                        --docker-registry-server-url https://$(acrLoginServer) \
                        --output none

                      # Set App Settings pulling from Key Vault references
                      az webapp config appsettings set \
                        --name $(backendAppService) \
                        --resource-group $(resourceGroupName) \
                        --settings \
                          DOCKER_REGISTRY_SERVER_URL="https://$(acrLoginServer)" \
                          WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
                          DB_CONNECTION_STRING="@Microsoft.KeyVault(SecretUri=https://$KV_NAME.vault.azure.net/secrets/db-connection-string/)" \
                          NODE_ENV=production \
                          IMAGE_TAG=$(imageTag) \
                        --output none

                      echo "✅ Backend App Service configured"

                - task: AzureCLI@2
                  displayName: '🔄 Restart Backend App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Restarting Backend App Service..."

                      az webapp restart \
                        --name $(backendAppService) \
                        --resource-group $(resourceGroupName)

                      echo "Waiting for app to come online..."
                      sleep 30

                      # Health check
                      BACKEND_URL=$(az webapp show \
                        --name $(backendAppService) \
                        --resource-group $(resourceGroupName) \
                        --query defaultHostName -o tsv)

                      echo "Backend URL: https://$BACKEND_URL"

                      # Retry health check up to 5 times
                      for i in {1..5}; do
                        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                          --max-time 30 \
                          "https://$BACKEND_URL/health" 2>/dev/null || echo "000")

                        echo "Attempt $i - HTTP Status: $HTTP_STATUS"

                        if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "204" ]; then
                          echo "✅ Backend is healthy!"
                          break
                        fi

                        if [ $i -eq 5 ]; then
                          echo "##vso[task.logissue type=warning]Backend health check did not return 200 after 5 attempts"
                        fi

                        sleep 15
                      done

      # ── Deploy Frontend ──────────────────────────────────────────
      - deployment: DeployFrontend
        displayName: 'Deploy Frontend App Service'
        dependsOn: DeployBackend
        environment: 'production-frontend'
        strategy:
          runOnce:
            deploy:
              steps:

                - task: AzureCLI@2
                  displayName: '⚙️ Configure Frontend App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Configuring Frontend App Service settings..."

                      # Get Backend URL to pass as env variable to frontend
                      BACKEND_URL=$(az webapp show \
                        --name $(backendAppService) \
                        --resource-group $(resourceGroupName) \
                        --query defaultHostName -o tsv)

                      # Update App Service container settings
                      az webapp config container set \
                        --name $(frontendAppService) \
                        --resource-group $(resourceGroupName) \
                        --docker-custom-image-name $(acrLoginServer)/$(frontendImageName):$(imageTag) \
                        --docker-registry-server-url https://$(acrLoginServer) \
                        --output none

                      # Set App Settings
                      az webapp config appsettings set \
                        --name $(frontendAppService) \
                        --resource-group $(resourceGroupName) \
                        --settings \
                          DOCKER_REGISTRY_SERVER_URL="https://$(acrLoginServer)" \
                          WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
                          REACT_APP_API_URL="https://$BACKEND_URL" \
                          NODE_ENV=production \
                          IMAGE_TAG=$(imageTag) \
                        --output none

                      echo "✅ Frontend App Service configured"

                - task: AzureCLI@2
                  displayName: '🔄 Restart Frontend App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Restarting Frontend App Service..."

                      az webapp restart \
                        --name $(frontendAppService) \
                        --resource-group $(resourceGroupName)

                      echo "Waiting for app to come online..."
                      sleep 30

                      # Health check
                      FRONTEND_URL=$(az webapp show \
                        --name $(frontendAppService) \
                        --resource-group $(resourceGroupName) \
                        --query defaultHostName -o tsv)

                      echo "Frontend URL: https://$FRONTEND_URL"

                      # Retry health check
                      for i in {1..5}; do
                        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                          --max-time 30 \
                          "https://$FRONTEND_URL" 2>/dev/null || echo "000")

                        echo "Attempt $i - HTTP Status: $HTTP_STATUS"

                        if [ "$HTTP_STATUS" = "200" ]; then
                          echo "✅ Frontend is healthy!"
                          break
                        fi

                        if [ $i -eq 5 ]; then
                          echo "##vso[task.logissue type=warning]Frontend health check did not return 200 after 5 attempts"
                        fi

                        sleep 15
                      done


# ══════════════════════════════════════════════════════════════════
# STAGE 5: POST DEPLOYMENT SUMMARY
# ══════════════════════════════════════════════════════════════════
  - stage: Summary
    displayName: '📋 Deployment Summary'
    dependsOn: Deploy
    condition: always()

    jobs:
      - job: DeploymentSummary
        displayName: 'Print Deployment Summary'
        steps:

          - task: AzureCLI@2
            displayName: '📊 Generate Summary Report'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "============================================="
                echo "       DEPLOYMENT SUMMARY REPORT"
                echo "============================================="
                echo ""
                echo "📦 Build Information:"
                echo "   Build ID  : $(Build.BuildId)"
                echo "   Branch    : $(Build.SourceBranchName)"
                echo "   Commit    : $(Build.SourceVersion)"
                echo "   Image Tag : $(imageTag)"
                echo ""
                echo "🐳 Docker Images:"
                echo "   Backend  : $(acrLoginServer)/$(backendImageName):$(imageTag)"
                echo "   Frontend : $(acrLoginServer)/$(frontendImageName):$(imageTag)"
                echo ""

                # Get App URLs
                BACKEND_URL=$(az webapp show \
                  --name $(backendAppService) \
                  --resource-group $(resourceGroupName) \
                  --query defaultHostName -o tsv 2>/dev/null || echo "N/A")

                FRONTEND_URL=$(az webapp show \
                  --name $(frontendAppService) \
                  --resource-group $(resourceGroupName) \
                  --query defaultHostName -o tsv 2>/dev/null || echo "N/A")

                echo "🌐 Application URLs:"
                echo "   Frontend : https://$FRONTEND_URL"
                echo "   Backend  : https://$BACKEND_URL"
                echo ""
                echo "🏗️  Infrastructure:"
                echo "   Terraform Deployed: $(INFRA_DEPLOYED)"
                echo "   Resource Group    : $(resourceGroupName)"
                echo "   ACR               : $(acrName)"
                echo ""
                echo "============================================="
                echo "✅ Pipeline completed at $(date)"
                echo "============================================="