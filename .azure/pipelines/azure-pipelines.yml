# ================================================================
#  azure-pipelines.yml
#  Project     : Employee Management System
#  Author      : DevOps Team
#  Description : Full CI/CD - Terraform Infra + Docker Build/Push
#                + App Service Deployment
#  Trigger     : main / develop branch commits
# ================================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - "*.md"
      - docs/**
      - .gitignore

pr: none  # Disable PR triggers - use separate PR pipeline if needed

# ================================================================
# VARIABLE GROUPS + PIPELINE VARIABLES
# ================================================================
variables:
  # Pull from Library → Variable Group
  - group: vg-myapp-pipeline-control

  # ── Azure Core ─────────────────────────────────────────────────
  - name: azureServiceConnection
    value: 'sc-azure-myapp-prod'               # ARM Service Connection

  - name: acrServiceConnection
    value: 'Full-Stack'                      # ACR Docker Service Connection

  - name: resourceGroupName
    value: 'rg-employee-app-prod'

  - name: location
    value: 'eastus'

  # ── ACR ────────────────────────────────────────────────────────
  - name: acrName
    value: 'employeeappacr'                    # Must be globally unique

  - name: acrLoginServer
    value: 'employeeappacr.azurecr.io'

  # ── App Services ───────────────────────────────────────────────
  - name: frontendAppService
    value: 'employee-frontend'

  - name: backendAppService
    value: 'employee-backend'

  # ── Docker Images ──────────────────────────────────────────────
  - name: frontendImageName
    value: 'employee-frontend'

  - name: backendImageName
    value: 'employee-backend'

  - name: imageTag
    value: '$(Build.BuildId)'

  # ── Terraform Backend (State Storage) ──────────────────────────
  - name: tfWorkingDir
    value: '$(System.DefaultWorkingDirectory)/terraform'

  - name: tfStateRG
    value: 'rg-terraform-state'

  - name: tfStorageAccount
    value: 'employeetfstate'                   # Must be globally unique, lowercase

  - name: tfStorageContainer
    value: 'tfstate'

  - name: tfStateFile
    value: 'employee-app.terraform.tfstate'

# ================================================================
# AGENT POOL
# ================================================================
pool:
  name: 'tribeca'                              # Your self-hosted agent pool


# ================================================================
# STAGE 1 — PRE-FLIGHT VALIDATION
# Purpose : Validate repo structure + determine if terraform runs
# ================================================================
stages:

  - stage: Validate
    displayName: 'Stage 1 — Pre-flight Validation'
    jobs:

      - job: PreCheck
        displayName: 'Validate Repo Structure & Flags'
        timeoutInMinutes: 10

        steps:

          - checkout: self
            fetchDepth: 0
            clean: true

          # ── Print Run Context ──────────────────────────────────
          - bash: |
              echo "================================================="
              echo "  PIPELINE EXECUTION CONTEXT"
              echo "================================================="
              echo "  Build ID       : $(Build.BuildId)"
              echo "  Build Number   : $(Build.BuildNumber)"
              echo "  Triggered By   : $(Build.Reason)"
              echo "  Branch         : $(Build.SourceBranchName)"
              echo "  Commit SHA     : $(Build.SourceVersion)"
              echo "  Agent Name     : $(Agent.Name)"
              echo "  Agent OS       : $(Agent.OS)"
              echo "================================================="
              echo "  INFRA_DEPLOYED FLAG : $(INFRA_DEPLOYED)"
              echo "================================================="
            displayName: 'Print Pipeline Context'

          # ── Evaluate Terraform Gate ────────────────────────────
          - bash: |
              if [ "$(INFRA_DEPLOYED)" = "true" ]; then
                echo "##vso[task.setvariable variable=RUN_TERRAFORM;isOutput=true]false"
                echo "[INFO] INFRA_DEPLOYED=true → Terraform stage will be SKIPPED"
              else
                echo "##vso[task.setvariable variable=RUN_TERRAFORM;isOutput=true]true"
                echo "[INFO] INFRA_DEPLOYED=false → Terraform stage will EXECUTE"
              fi
            displayName: 'Evaluate Terraform Gate'
            name: TerraformGate

          # ── Validate Required Files ────────────────────────────
          - bash: |
              set -e
              ERRORS=0

              check_path() {
                if [ ! -e "$1" ]; then
                  echo "##vso[task.logissue type=error]MISSING: $1"
                  ERRORS=$((ERRORS + 1))
                else
                  echo "[OK] Found: $1"
                fi
              }

              echo "--- Checking Required Files ---"
              check_path "$(System.DefaultWorkingDirectory)/frontend/Dockerfile"
              check_path "$(System.DefaultWorkingDirectory)/backend/Dockerfile"
              check_path "$(System.DefaultWorkingDirectory)/terraform"
              check_path "$(System.DefaultWorkingDirectory)/terraform/main.tf"
              check_path "$(System.DefaultWorkingDirectory)/terraform/variables.tf"
              check_path "$(System.DefaultWorkingDirectory)/terraform/outputs.tf"

              if [ $ERRORS -gt 0 ]; then
                echo "##vso[task.logissue type=error]$ERRORS required file(s) missing. Aborting."
                exit 1
              fi

              echo "--- All required files present ---"
            displayName: 'Validate Required Files & Structure'


# ================================================================
# STAGE 2 — TERRAFORM INFRASTRUCTURE
# Runs ONLY when INFRA_DEPLOYED = false (first run)
# ================================================================

  - stage: Terraform
    displayName: 'Stage 2 — Infrastructure Provisioning (First Run Only)'
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        ne(variables['INFRA_DEPLOYED'], 'true')
      )

    jobs:

      - job: ProvisionInfrastructure
        displayName: 'Terraform Init → Validate → Plan → Apply'
        timeoutInMinutes: 90

        steps:
          - checkout: self
            clean: true

          # ── Step 1: Bootstrap Terraform Backend Storage ────────
          - task: AzureCLI@2
            displayName: 'Bootstrap — Create Terraform State Storage'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                echo "================================================="
                echo "  Bootstrapping Terraform Remote State Backend"
                echo "================================================="

                # Resource Group
                echo "[1/3] Creating Resource Group: $(tfStateRG)"
                az group create \
                  --name "$(tfStateRG)" \
                  --location "$(location)" \
                  --output none

                # Storage Account
                echo "[2/3] Creating Storage Account: $(tfStorageAccount)"
                az storage account create \
                  --name "$(tfStorageAccount)" \
                  --resource-group "$(tfStateRG)" \
                  --location "$(location)" \
                  --sku Standard_LRS \
                  --kind StorageV2 \
                  --allow-blob-public-access false \
                  --output none

                # Blob Container
                echo "[3/3] Creating Blob Container: $(tfStorageContainer)"
                az storage container create \
                  --name "$(tfStorageContainer)" \
                  --account-name "$(tfStorageAccount)" \
                  --auth-mode login \
                  --output none

                # Export storage key as secret pipeline variable
                STORAGE_KEY=$(az storage account keys list \
                  --account-name "$(tfStorageAccount)" \
                  --resource-group "$(tfStateRG)" \
                  --query '[0].value' \
                  --output tsv)

                echo "##vso[task.setvariable variable=TF_BACKEND_KEY;issecret=true]$STORAGE_KEY"
                echo "[DONE] Terraform backend storage is ready"

          # ── Step 2: Terraform Init ─────────────────────────────
          - task: TerraformTaskV4@4
            displayName: 'Terraform — Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(tfWorkingDir)'
              backendServiceArm: '$(azureServiceConnection)'
              backendAzureRmResourceGroupName: '$(tfStateRG)'
              backendAzureRmStorageAccountName: '$(tfStorageAccount)'
              backendAzureRmContainerName: '$(tfStorageContainer)'
              backendAzureRmKey: '$(tfStateFile)'

          # ── Step 3: Terraform Validate ─────────────────────────
          - task: TerraformTaskV4@4
            displayName: 'Terraform — Validate'
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: '$(tfWorkingDir)'

          # ── Step 4: Terraform Plan ─────────────────────────────
          - task: TerraformTaskV4@4
            displayName: 'Terraform — Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(tfWorkingDir)'
              environmentServiceNameAzureRM: '$(azureServiceConnection)'
              commandOptions: >-
                -out="$(tfWorkingDir)/tfplan"
                -var="resource_group_name=$(resourceGroupName)"
                -var="location=$(location)"
                -var="acr_name=$(acrName)"
                -var="frontend_app_name=$(frontendAppService)"
                -var="backend_app_name=$(backendAppService)"
                -input=false

          # ── Step 5: Archive Plan File ──────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish — Terraform Plan Artifact'
            inputs:
              targetPath: '$(tfWorkingDir)/tfplan'
              artifact: 'terraform-plan-$(Build.BuildId)'
              publishLocation: 'pipeline'

          # ── Step 6: Terraform Apply ────────────────────────────
          - task: TerraformTaskV4@4
            displayName: 'Terraform — Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(tfWorkingDir)'
              environmentServiceNameAzureRM: '$(azureServiceConnection)'
              commandOptions: '-auto-approve -input=false "$(tfWorkingDir)/tfplan"'

          # ── Step 7: Capture Outputs ────────────────────────────
          - task: AzureCLI@2
            displayName: 'Capture — Terraform Output Values'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(tfWorkingDir)'
              inlineScript: |
                set -e
                echo "Reading Terraform outputs..."

                TF_ACR=$(terraform output -raw acr_login_server 2>/dev/null \
                  || echo "$(acrLoginServer)")

                TF_KV=$(terraform output -raw key_vault_name 2>/dev/null \
                  || echo "")

                echo "  ACR Login Server : $TF_ACR"
                echo "  Key Vault Name   : $TF_KV"

                echo "##vso[task.setvariable variable=TF_ACR_SERVER;isOutput=true]$TF_ACR"
                echo "##vso[task.setvariable variable=TF_KV_NAME;isOutput=true]$TF_KV"
            name: TerraformOutputs

          # ── Step 8: Flip INFRA_DEPLOYED Flag ──────────────────
          # This prevents terraform from running on future commits
          - task: AzureCLI@2
            displayName: 'Update — Set INFRA_DEPLOYED = true in Variable Group'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                echo "Updating Variable Group flag INFRA_DEPLOYED → true"

                ORG_URL="$(System.TeamFoundationCollectionUri)"
                PROJECT="$(System.TeamProject)"
                VG_ID="$(VARIABLE_GROUP_ID)"

                # Encode PAT for Basic Auth
                B64_PAT=$(echo -n ":$(PAT_TOKEN)" | base64)

                # First GET current variable group to preserve all variables
                VG_JSON=$(curl -sf \
                  -H "Authorization: Basic $B64_PAT" \
                  "${ORG_URL}${PROJECT}/_apis/distributedtask/variablegroups/${VG_ID}?api-version=7.0")

                if [ $? -ne 0 ]; then
                  echo "##vso[task.logissue type=warning]Could not fetch variable group. Set INFRA_DEPLOYED manually."
                  exit 0
                fi

                # Patch INFRA_DEPLOYED value using jq
                UPDATED_JSON=$(echo "$VG_JSON" | jq \
                  '.variables.INFRA_DEPLOYED.value = "true"')

                # PUT updated variable group back
                HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
                  -X PUT \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Basic $B64_PAT" \
                  "${ORG_URL}${PROJECT}/_apis/distributedtask/variablegroups/${VG_ID}?api-version=7.0" \
                  -d "$UPDATED_JSON")

                if [ "$HTTP_CODE" = "200" ]; then
                  echo "[SUCCESS] INFRA_DEPLOYED set to true"
                  echo "[INFO] Terraform will be SKIPPED on all future pipeline runs"
                else
                  echo "##vso[task.logissue type=warning]API returned HTTP $HTTP_CODE — Set INFRA_DEPLOYED=true manually in Library"
                fi


# ================================================================
# STAGE 3 — BUILD & PUSH DOCKER IMAGES
# Runs after Terraform (or skips terraform if already deployed)
# Builds backend and frontend in PARALLEL for speed
# ================================================================

  - stage: Build
    displayName: 'Stage 3 — Build & Push Docker Images to ACR'
    dependsOn:
      - Validate
      - Terraform
    condition: |
      and(
        not(failed()),
        not(canceled()),
        in(dependencies.Terraform.result, 'Succeeded', 'Skipped')
      )

    jobs:

      # ── Job A: Backend Image ────────────────────────────────────
      - job: BuildBackend
        displayName: 'Build & Push — Backend Image'
        timeoutInMinutes: 30

        steps:
          - checkout: self
            clean: true

          - task: Docker@2
            displayName: 'ACR Login'
            inputs:
              command: 'login'
              containerRegistry: '$(acrServiceConnection)'

          - task: Docker@2
            displayName: 'Build Backend Image'
            inputs:
              command: 'build'
              containerRegistry: '$(acrServiceConnection)'
              repository: '$(backendImageName)'
              dockerfile: '$(System.DefaultWorkingDirectory)/backend/Dockerfile'
              buildContext: '$(System.DefaultWorkingDirectory)/backend'
              tags: |
                $(imageTag)
                latest
              arguments: >-
                --no-cache
                --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                --build-arg BUILD_VERSION=$(Build.BuildId)
                --build-arg GIT_COMMIT=$(Build.SourceVersion)

          - task: Docker@2
            displayName: 'Push Backend Image → ACR'
            inputs:
              command: 'push'
              containerRegistry: '$(acrServiceConnection)'
              repository: '$(backendImageName)'
              tags: |
                $(imageTag)
                latest

          - task: AzureCLI@2
            displayName: 'Verify Backend Image in ACR'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Verifying backend image tags in ACR..."
                az acr repository show-tags \
                  --name "$(acrName)" \
                  --repository "$(backendImageName)" \
                  --orderby time_desc \
                  --output table

                # Confirm specific build tag exists
                TAG_EXISTS=$(az acr repository show-tags \
                  --name "$(acrName)" \
                  --repository "$(backendImageName)" \
                  --query "contains(@, '$(imageTag)')" \
                  --output tsv)

                if [ "$TAG_EXISTS" = "true" ]; then
                  echo "[VERIFIED] Tag $(imageTag) confirmed in ACR"
                else
                  echo "##vso[task.logissue type=error]Tag $(imageTag) NOT found in ACR after push!"
                  exit 1
                fi

      # ── Job B: Frontend Image (runs in PARALLEL with backend) ──
      - job: BuildFrontend
        displayName: 'Build & Push — Frontend Image'
        timeoutInMinutes: 30

        steps:
          - checkout: self
            clean: true

          - task: Docker@2
            displayName: 'ACR Login'
            inputs:
              command: 'login'
              containerRegistry: '$(acrServiceConnection)'

          - task: Docker@2
            displayName: 'Build Frontend Image'
            inputs:
              command: 'build'
              containerRegistry: '$(acrServiceConnection)'
              repository: '$(frontendImageName)'
              dockerfile: '$(System.DefaultWorkingDirectory)/frontend/Dockerfile'
              buildContext: '$(System.DefaultWorkingDirectory)/frontend'
              tags: |
                $(imageTag)
                latest
              arguments: >-
                --no-cache
                --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                --build-arg BUILD_VERSION=$(Build.BuildId)
                --build-arg GIT_COMMIT=$(Build.SourceVersion)

          - task: Docker@2
            displayName: 'Push Frontend Image → ACR'
            inputs:
              command: 'push'
              containerRegistry: '$(acrServiceConnection)'
              repository: '$(frontendImageName)'
              tags: |
                $(imageTag)
                latest

          - task: AzureCLI@2
            displayName: 'Verify Frontend Image in ACR'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Verifying frontend image tags in ACR..."
                az acr repository show-tags \
                  --name "$(acrName)" \
                  --repository "$(frontendImageName)" \
                  --orderby time_desc \
                  --output table

                TAG_EXISTS=$(az acr repository show-tags \
                  --name "$(acrName)" \
                  --repository "$(frontendImageName)" \
                  --query "contains(@, '$(imageTag)')" \
                  --output tsv)

                if [ "$TAG_EXISTS" = "true" ]; then
                  echo "[VERIFIED] Tag $(imageTag) confirmed in ACR"
                else
                  echo "##vso[task.logissue type=error]Tag $(imageTag) NOT found in ACR after push!"
                  exit 1
                fi


# ================================================================
# STAGE 4 — DEPLOY BACKEND FIRST, THEN FRONTEND
# Sequential deployment: Backend must be healthy before frontend
# ================================================================

  - stage: DeployBackend
    displayName: 'Stage 4a — Deploy Backend App Service'
    dependsOn: Build
    condition: succeeded('Build')

    jobs:

      - deployment: DeployBackendApp
        displayName: 'Deploy & Health-Check Backend'
        environment: 'production-backend'      # Create in Environments section
        timeoutInMinutes: 20
        strategy:
          runOnce:
            deploy:
              steps:

                # ── Pull Key Vault Name & Set Container ──────────
                - task: AzureCLI@2
                  displayName: 'Configure Backend Container + App Settings'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e
                      echo "================================================="
                      echo "  Deploying Backend: $(backendAppService)"
                      echo "  Image Tag        : $(imageTag)"
                      echo "================================================="

                      # Discover Key Vault in resource group
                      KV_NAME=$(az keyvault list \
                        --resource-group "$(resourceGroupName)" \
                        --query '[0].name' \
                        --output tsv)

                      if [ -z "$KV_NAME" ]; then
                        echo "##vso[task.logissue type=error]No Key Vault found in $(resourceGroupName)"
                        exit 1
                      fi

                      echo "  Key Vault Found  : $KV_NAME"

                      # Set container image
                      echo "[1/2] Setting container image..."
                      az webapp config container set \
                        --name "$(backendAppService)" \
                        --resource-group "$(resourceGroupName)" \
                        --docker-custom-image-name \
                          "$(acrLoginServer)/$(backendImageName):$(imageTag)" \
                        --docker-registry-server-url \
                          "https://$(acrLoginServer)" \
                        --output none

                      # Set application settings with Key Vault references
                      echo "[2/2] Applying App Settings..."
                      az webapp config appsettings set \
                        --name "$(backendAppService)" \
                        --resource-group "$(resourceGroupName)" \
                        --settings \
                          WEBSITES_ENABLE_APP_SERVICE_STORAGE="false" \
                          DOCKER_REGISTRY_SERVER_URL="https://$(acrLoginServer)" \
                          ASPNETCORE_ENVIRONMENT="Production" \
                          NODE_ENV="production" \
                          DEPLOYED_IMAGE_TAG="$(imageTag)" \
                          DEPLOYED_BUILD_ID="$(Build.BuildId)" \
                          DB_CONNECTION_STRING="@Microsoft.KeyVault(SecretUri=https://$KV_NAME.vault.azure.net/secrets/db-connection-string/)" \
                          JWT_SECRET="@Microsoft.KeyVault(SecretUri=https://$KV_NAME.vault.azure.net/secrets/jwt-secret/)" \
                        --output none

                      echo "[DONE] Backend App Service configured"

                # ── Restart + Health Check ────────────────────────
                - task: AzureCLI@2
                  displayName: 'Restart Backend & Verify Health'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e

                      echo "Restarting $(backendAppService)..."
                      az webapp restart \
                        --name "$(backendAppService)" \
                        --resource-group "$(resourceGroupName)"

                      # Get the app hostname
                      APP_HOST=$(az webapp show \
                        --name "$(backendAppService)" \
                        --resource-group "$(resourceGroupName)" \
                        --query defaultHostName \
                        --output tsv)

                      HEALTH_URL="https://$APP_HOST/health"
                      echo "Health Check URL: $HEALTH_URL"
                      echo "Waiting 40s for container cold start..."
                      sleep 40

                      # Retry loop - 6 attempts, 15s apart = max 90s wait
                      MAX_RETRIES=6
                      RETRY_WAIT=15
                      SUCCESS=false

                      for i in $(seq 1 $MAX_RETRIES); do
                        echo "--- Health Check Attempt [$i/$MAX_RETRIES] ---"

                        HTTP_CODE=$(curl -sf \
                          -o /dev/null \
                          -w "%{http_code}" \
                          --max-time 20 \
                          --retry 0 \
                          "$HEALTH_URL" 2>/dev/null || echo "000")

                        echo "    HTTP Status: $HTTP_CODE"

                        if [[ "$HTTP_CODE" =~ ^(200|204)$ ]]; then
                          echo "[HEALTHY] Backend is up and responding"
                          SUCCESS=true
                          break
                        fi

                        if [ $i -lt $MAX_RETRIES ]; then
                          echo "    Retrying in ${RETRY_WAIT}s..."
                          sleep $RETRY_WAIT
                        fi
                      done

                      if [ "$SUCCESS" = "false" ]; then
                        echo "##vso[task.logissue type=error]Backend health check FAILED after $MAX_RETRIES attempts"
                        echo "##vso[task.logissue type=error]Last HTTP status: $HTTP_CODE"
                        exit 1
                      fi

                      echo "Backend deployed successfully: https://$APP_HOST"


# ================================================================
# STAGE 5 — DEPLOY FRONTEND (after backend is confirmed healthy)
# ================================================================

  - stage: DeployFrontend
    displayName: 'Stage 4b — Deploy Frontend App Service'
    dependsOn: DeployBackend
    condition: succeeded('DeployBackend')

    jobs:

      - deployment: DeployFrontendApp
        displayName: 'Deploy & Health-Check Frontend'
        environment: 'production-frontend'
        timeoutInMinutes: 20
        strategy:
          runOnce:
            deploy:
              steps:

                # ── Get Backend URL → Inject to Frontend ──────────
                - task: AzureCLI@2
                  displayName: 'Configure Frontend Container + App Settings'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e
                      echo "================================================="
                      echo "  Deploying Frontend: $(frontendAppService)"
                      echo "  Image Tag         : $(imageTag)"
                      echo "================================================="

                      # Resolve backend URL dynamically
                      BACKEND_HOST=$(az webapp show \
                        --name "$(backendAppService)" \
                        --resource-group "$(resourceGroupName)" \
                        --query defaultHostName \
                        --output tsv)

                      BACKEND_API_URL="https://$BACKEND_HOST"
                      echo "  Backend API URL  : $BACKEND_API_URL"

                      # Set container image
                      echo "[1/2] Setting container image..."
                      az webapp config container set \
                        --name "$(frontendAppService)" \
                        --resource-group "$(resourceGroupName)" \
                        --docker-custom-image-name \
                          "$(acrLoginServer)/$(frontendImageName):$(imageTag)" \
                        --docker-registry-server-url \
                          "https://$(acrLoginServer)" \
                        --output none

                      # Set application settings
                      echo "[2/2] Applying App Settings..."
                      az webapp config appsettings set \
                        --name "$(frontendAppService)" \
                        --resource-group "$(resourceGroupName)" \
                        --settings \
                          WEBSITES_ENABLE_APP_SERVICE_STORAGE="false" \
                          DOCKER_REGISTRY_SERVER_URL="https://$(acrLoginServer)" \
                          NODE_ENV="production" \
                          REACT_APP_API_BASE_URL="$BACKEND_API_URL" \
                          DEPLOYED_IMAGE_TAG="$(imageTag)" \
                          DEPLOYED_BUILD_ID="$(Build.BuildId)" \
                        --output none

                      echo "[DONE] Frontend App Service configured"

                # ── Restart + Health Check ────────────────────────
                - task: AzureCLI@2
                  displayName: 'Restart Frontend & Verify Health'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e

                      echo "Restarting $(frontendAppService)..."
                      az webapp restart \
                        --name "$(frontendAppService)" \
                        --resource-group "$(resourceGroupName)"

                      APP_HOST=$(az webapp show \
                        --name "$(frontendAppService)" \
                        --resource-group "$(resourceGroupName)" \
                        --query defaultHostName \
                        --output tsv)

                      HEALTH_URL="https://$APP_HOST"
                      echo "Health Check URL: $HEALTH_URL"
                      echo "Waiting 40s for container cold start..."
                      sleep 40

                      MAX_RETRIES=6
                      RETRY_WAIT=15
                      SUCCESS=false

                      for i in $(seq 1 $MAX_RETRIES); do
                        echo "--- Health Check Attempt [$i/$MAX_RETRIES] ---"

                        HTTP_CODE=$(curl -sf \
                          -o /dev/null \
                          -w "%{http_code}" \
                          --max-time 20 \
                          "$HEALTH_URL" 2>/dev/null || echo "000")

                        echo "    HTTP Status: $HTTP_CODE"

                        if [[ "$HTTP_CODE" =~ ^(200|301|302)$ ]]; then
                          echo "[HEALTHY] Frontend is up and responding"
                          SUCCESS=true
                          break
                        fi

                        if [ $i -lt $MAX_RETRIES ]; then
                          echo "    Retrying in ${RETRY_WAIT}s..."
                          sleep $RETRY_WAIT
                        fi
                      done

                      if [ "$SUCCESS" = "false" ]; then
                        echo "##vso[task.logissue type=error]Frontend health check FAILED after $MAX_RETRIES attempts"
                        exit 1
                      fi

                      echo "Frontend deployed successfully: https://$APP_HOST"


# ================================================================
# STAGE 6 — FINAL SUMMARY (always runs)
# ================================================================

  - stage: Summary
    displayName: 'Stage 5 — Deployment Summary'
    dependsOn:
      - DeployBackend
      - DeployFrontend
    condition: always()

    jobs:

      - job: PrintSummary
        displayName: 'Generate Deployment Report'
        timeoutInMinutes: 5

        steps:

          - task: AzureCLI@2
            displayName: 'Print Final Deployment Report'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                BACKEND_HOST=$(az webapp show \
                  --name "$(backendAppService)" \
                  --resource-group "$(resourceGroupName)" \
                  --query defaultHostName -o tsv 2>/dev/null || echo "unavailable")

                FRONTEND_HOST=$(az webapp show \
                  --name "$(frontendAppService)" \
                  --resource-group "$(resourceGroupName)" \
                  --query defaultHostName -o tsv 2>/dev/null || echo "unavailable")

                echo ""
                echo "=========================================================="
                echo "              DEPLOYMENT SUMMARY REPORT"
                echo "=========================================================="
                echo ""
                echo "  BUILD"
                echo "  ├─ Build ID    : $(Build.BuildId)"
                echo "  ├─ Branch      : $(Build.SourceBranchName)"
                echo "  ├─ Commit      : $(Build.SourceVersion)"
                echo "  └─ Timestamp   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
                echo ""
                echo "  DOCKER IMAGES (ACR: $(acrLoginServer))"
                echo "  ├─ Backend     : $(backendImageName):$(imageTag)"
                echo "  └─ Frontend    : $(frontendImageName):$(imageTag)"
                echo ""
                echo "  DEPLOYED ENDPOINTS"
                echo "  ├─ Backend     : https://$BACKEND_HOST"
                echo "  └─ Frontend    : https://$FRONTEND_HOST"
                echo ""
                echo "  INFRASTRUCTURE"
                echo "  ├─ Resource Group    : $(resourceGroupName)"
                echo "  ├─ ACR               : $(acrName)"
                echo "  └─ Infra Deployed    : $(INFRA_DEPLOYED)"
                echo ""
                echo "=========================================================="