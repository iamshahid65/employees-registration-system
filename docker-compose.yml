version: '3.9'

services:

  # ── MySQL Database ────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: employee_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    ports:
      - "3306:3306"           # expose only if you need external DB access
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network

  # ── Node.js Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: employee_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:        db          # use service name, NOT localhost
      DB_PORT:        3306
      DB_USER:        ${DB_USER}
      DB_PASSWORD:    ${DB_PASSWORD}
      DB_NAME:        ${DB_NAME}
      PORT:           5000
      FRONTEND_URL:   http://localhost:80
      NODE_ENV:       production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy   # waits for MySQL to be ready
    networks:
      - app_network

  # ── React Frontend (served by nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend:5000
    container_name: employee_frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - backend
    networks:
      - app_network

# ── Shared volumes & network ──────────────────────────────────
volumes:
  db_data:

networks:
  app_network:
    driver: bridge